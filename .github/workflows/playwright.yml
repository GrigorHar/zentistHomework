name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - feature/playwright-qa-automation
      browser:
        description: 'Browser to run tests on'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      spec:
        description: 'Test spec to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - tests/test_main_page.py
          - tests/test_login_invalid_credentials.py
          - tests/test_login_valid.py

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CMD="python -m pytest"
            [ "${{ github.event.inputs.browser }}" != "" ] && [ "${{ github.event.inputs.browser }}" != "all" ] && CMD="$CMD --browser ${{ github.event.inputs.browser }}"
            [ "${{ github.event.inputs.spec }}" != "" ] && [ "${{ github.event.inputs.spec }}" != "all" ] && CMD="$CMD ${{ github.event.inputs.spec }}"
            eval $CMD
          else
            python -m pytest
          fi
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://the-internet.herokuapp.com' }}
          LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
